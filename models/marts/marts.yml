version: 2

models:
  - name: fct_hospital_audit
    description: "The final audit table joining Medicare charges with hospital ratings."
    columns:
      - name: price_variance
        tests:
          - not_null
      - name: hospital_overall_rating
        tests:
          - accepted_values:
              values: ['1', '2', '3', '4', '5', 'Not Available']